name: OS Tests

on:
  pull_request:

jobs:
  run-leia-os-tests:
    runs-on: ${{ matrix.os }}
    env:
      term: xterm
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - ubuntu-24.04
          - windows-2022
    steps:
      - name: Checkout action code
        uses: actions/checkout@v4
      - name: Run Leia Action
        uses: ./
        with:
          leia-test: tests/TEST1.md